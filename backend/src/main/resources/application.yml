# Spring Boot Application Configuration
# TTRPG Assistant Backend

# ==================== SERVER ====================
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# ==================== DATABASE ====================
spring:
  datasource:
    # PostgreSQL connection details from environment variables
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      # Validate schema matches migrations; never auto-create/update schema in production
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Enable SQL logging for debugging (disable in production)
        # show_sql: true
        # format_sql: true

  # Flyway Database Migrations
  flyway:
    enabled: true
    # SQL migrations are located in: src/main/resources/db/migration/
    locations: classpath:db/migration
    validate_on_migrate: true

# ==================== SECURITY & AUTH ====================
app:
  security:
    # JWT configuration - MUST be set via environment variable
    # Generate a strong secret: echo $RANDOM | md5sum
    jwtSecret: ${JWT_SECRET}
    # JWT token expiration time in minutes (default: 7 days)
    jwtExpirationMinutes: ${JWT_EXP_MIN:10080}

  # CORS configuration for frontend access
  cors:
    # Comma-separated list of allowed origins
    # Development examples:
    # - http://localhost:5173
    # - http://localhost:5174
    # - http://127.0.0.1:5173
    # - http://127.0.0.1:5174
    # Production: https://yourdomain.com
    allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}

  # AI Integration (OpenAI & DeepAI)
  openai:
    # OpenAI API key for GPT models
    apiKey: ${OPENAI_API_KEY:}
    # Model to use: gpt-4, gpt-4-turbo, gpt-3.5-turbo, etc.
    model: ${OPENAI_MODEL:gpt-4-turbo}

  deepai:
    # DeepAI API key for image generation
    apiKey: ${DEEPAI_API_KEY:}

# ==================== LOGGING ====================
logging:
  level:
    root: INFO
    # Uncomment for debugging specific packages:
    # pl.ttrpgassistant: DEBUG
    # org.springframework.security: DEBUG
